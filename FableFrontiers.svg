<svg width="680" height="400" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Research program topic map</title>
<desc>Six research topics arranged by dependency: memory-hard proof of work, post-quantum primitives, and hardware-native ML feed useful-work and inference-hardware proof of work and personalization, which all feed a final synthesis.</desc>
