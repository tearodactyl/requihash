  <text x="545" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Numerics, dataflow</text>
</g>
<g>
  <rect x="40" y="170" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
