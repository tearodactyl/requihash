  <text x="125" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Equihash and successors</text>
</g>
<g>
  <rect x="250" y="40" width="150" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
