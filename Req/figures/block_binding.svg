<svg width="720" height="360" viewBox="0 0 720 360" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>How block contents bind to the Requihash proof-of-work</title>
<desc>Flow from block header fields through BLAKE2b base state, per-leaf hashing, Wagner solve, solution embedding, and the difficulty check, showing the three bindings that prevent precomputation and reuse.</desc>
<text x="20" y="28" font-size="16" font-weight="500" fill="#2C2C2A">Block-to-PoW binding (Requihash changes only the leaf key)</text>

<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5"/></marker></defs>

<g font-size="11">
<rect x="30" y="60" width="150" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="80" text-anchor="middle" font-weight="500" fill="#2C2C2A">header fields</text>
<text x="105" y="96" text-anchor="middle" fill="#888780">version, prev, merkle,</text>
<text x="105" y="108" text-anchor="middle" fill="#888780">time, bits (not nonce)</text>

<rect x="30" y="130" width="150" height="34" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="105" y="151" text-anchor="middle" fill="#0C447C">nonce (iterated)</text>

<rect x="250" y="90" width="170" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="335" y="110" text-anchor="middle" font-weight="500" fill="#0C447C">BLAKE2b base state</text>
<text x="335" y="126" text-anchor="middle" fill="#185FA5">H_person(input || nonce)</text>

<rect x="250" y="170" width="170" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="335" y="189" text-anchor="middle" font-weight="500" fill="#085041">per-leaf hash + Wagner</text>
<text x="335" y="205" text-anchor="middle" fill="#0F6E56">solution = 2^k indices</text>

<rect x="250" y="246" width="170" height="34" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="335" y="267" text-anchor="middle" fill="#2C2C2A">block.solution = encode(indices)</text>

<rect x="490" y="246" width="200" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="590" y="267" text-anchor="middle" fill="#633806">difficulty: H(header) &lt;= target ?</text>
</g>

<line x1="180" y1="85" x2="248" y2="105" stroke="#5F5E5A" stroke-width="0.75" marker-end="url(#a)"/>
<line x1="180" y1="147" x2="248" y2="125" stroke="#5F5E5A" stroke-width="0.75" marker-end="url(#a)"/>
<line x1="335" y1="140" x2="335" y2="168" stroke="#5F5E5A" stroke-width="0.75" marker-end="url(#a)"/>
<line x1="335" y1="216" x2="335" y2="244" stroke="#5F5E5A" stroke-width="0.75" marker-end="url(#a)"/>
<line x1="420" y1="263" x2="488" y2="263" stroke="#5F5E5A" stroke-width="0.75" marker-end="url(#a)"/>

<!-- binding annotations -->
<g font-size="11" fill="#791F1F">
<text x="450" y="105">binding 1: input absorbed →</text>
<text x="450" y="120">every leaf depends on block;</text>
<text x="450" y="135">no cross-block reuse</text>
<text x="450" y="180">binding 2: nonce absorbed →</text>
<text x="450" y="195">fresh list per nonce (search loop)</text>
</g>
<text x="490" y="300" font-size="11" fill="#5F5E5A">binding 3: solution embedded before the</text>
<text x="490" y="314" font-size="11" fill="#5F5E5A">difficulty hash → difficulty commits to it.</text>
<text x="30" y="330" font-size="11" fill="#5F5E5A">Requihash alters only the per-leaf key (class i mod k); all three bindings are byte-identical to Equihash [Measured via cross-check].</text>
</svg>
