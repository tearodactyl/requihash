<svg width="720" height="460" viewBox="0 0 720 460" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>Requihash Wagner tree with regularity binding and shortcut attack surfaces</title>
<desc>A binary merge tree over 2^k leaves; each leaf is keyed by its list-class (i mod k) and counter (i / k). Rounds collide on n/(k+1) bits and XOR-trim. Annotations mark where precomputation, parallelization, and memory-reduction shortcuts attack.</desc>
<text x="20" y="28" font-size="16" font-weight="500" fill="#2C2C2A">Requihash search pattern: Wagner tree + regularity binding</text>
<text x="20" y="46" font-size="12" fill="#5F5E5A">Leaf i keyed by class (i mod k) and counter (i / k). Rounds collide on ell=n/(k+1) bits, then XOR-trim.</text>

<!-- leaves row -->
<g font-size="11">
<rect x="60" y="80" width="70" height="34" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="95" y="98" text-anchor="middle" fill="#0C447C">leaf 0</text><text x="95" y="110" text-anchor="middle" fill="#185FA5">class 0</text>
<rect x="145" y="80" width="70" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="180" y="98" text-anchor="middle" fill="#085041">leaf 1</text><text x="180" y="110" text-anchor="middle" fill="#0F6E56">class 1</text>
<rect x="230" y="80" width="70" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="265" y="98" text-anchor="middle" fill="#633806">leaf 2</text><text x="265" y="110" text-anchor="middle" fill="#854F0B">class 2</text>
<rect x="315" y="80" width="70" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="350" y="98" text-anchor="middle" fill="#26215C">leaf 3</text><text x="350" y="110" text-anchor="middle" fill="#534AB7">class 3</text>
<text x="410" y="102" font-size="12" fill="#888780">... 2^k leaves, class = i mod k ...</text>
</g>

<!-- round 1 merge -->
<line x1="95" y1="114" x2="137" y2="150" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="180" y1="114" x2="143" y2="150" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="265" y1="114" x2="307" y2="150" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="350" y1="114" x2="313" y2="150" stroke="#5F5E5A" stroke-width="0.75"/>
<g font-size="11">
<rect x="100" y="150" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="140" y="169" text-anchor="middle" fill="#2C2C2A">collide ell bits</text>
<rect x="270" y="150" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="310" y="169" text-anchor="middle" fill="#2C2C2A">collide ell bits</text>
</g>
<text x="470" y="169" font-size="11" fill="#888780">round 1: pair colliding rows, XOR, drop ell bits</text>

<!-- round 2 -->
<line x1="140" y1="180" x2="222" y2="216" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="310" y1="180" x2="228" y2="216" stroke="#5F5E5A" stroke-width="0.75"/>
<rect x="185" y="216" width="80" height="30" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="225" y="235" text-anchor="middle" font-size="11" fill="#2C2C2A">collide ell bits</text>
<text x="470" y="235" font-size="11" fill="#888780">round 2 ... k rounds total</text>

<!-- root -->
<line x1="225" y1="246" x2="225" y2="282" stroke="#5F5E5A" stroke-width="0.75"/>
<rect x="165" y="282" width="120" height="32" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="225" y="302" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">root XOR = 0 : solution</text>

<!-- attack surface callouts -->
<g font-size="11">
<rect x="430" y="330" width="270" height="24" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="440" y="346" fill="#791F1F">TMTO (S4.3/H1): drop whole classes, recompute?</text>
<rect x="430" y="360" width="270" height="24" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="440" y="376" fill="#633806">precompute (S4.1/H2): share class BLAKE2b prefix</text>
<rect x="430" y="390" width="270" height="24" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="440" y="406" fill="#085041">parallelize (S4.2/H3): classes pre-partition round 1</text>
</g>

<!-- arrows from callouts to structure -->
<line x1="430" y1="342" x2="290" y2="230" stroke="#A32D2D" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="430" y1="372" x2="300" y2="100" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="430" y1="402" x2="230" y2="165" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 2"/>

<text x="20" y="340" font-size="11" fill="#5F5E5A">The k list-classes are new</text>
<text x="20" y="356" font-size="11" fill="#5F5E5A">structure vs Equihash's one</text>
<text x="20" y="372" font-size="11" fill="#5F5E5A">list. They CLOSE the single-list</text>
<text x="20" y="388" font-size="11" fill="#5F5E5A">ASIC attack (L4) but OPEN a</text>
<text x="20" y="404" font-size="11" fill="#5F5E5A">structure surface (L7): the</text>
<text x="20" y="420" font-size="11" fill="#5F5E5A">right-hand callouts.</text>
</svg>
